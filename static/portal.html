<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant \ Botivate-Assist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen text-white flex items-center justify-center p-4">
    <div class="glass max-w-lg w-full rounded-2xl p-8 shadow-2xl space-y-8 animate-fade-in text-center">
        <!-- Logo Header -->
        <div class="space-y-4">
            <div
                class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-xl mx-auto flex items-center justify-center shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Activate Your Assistant</h1>
            <p class="text-gray-400">Select your preferred messaging platform below to securely link your Botivate
                assistant to your account.</p>
        </div>

        <div id="selection-area" class="grid gap-4 mt-8">
            <a id="btn-telegram" href="#"
                class="group relative flex items-center justify-between bg-[#0088cc]/10 hover:bg-[#0088cc]/20 border border-[#0088cc]/30 p-4 rounded-xl transition-all duration-300">
                <div class="flex items-center gap-4">
                    <div class="bg-[#0088cc] p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.19-.08-.05-.19-.02-.27 0-.12.03-1.95 1.25-5.5 3.65-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.41-1.41-.87.03-.23.36-.47.98-.72 3.86-1.68 6.43-2.79 7.72-3.32 3.67-1.52 4.43-1.78 4.93-1.79.11 0 .36.03.49.13.11.08.15.19.16.29 0 .04-.01.19-.02.3z" />
                        </svg>
                    </div>
                    <div class="text-left">
                        <p class="font-semibold text-white">Telegram</p>
                        <p class="text-sm text-gray-400">Launch in Telegram App</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-[#0088cc] opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>

            <a id="btn-whatsapp" href="#"
                class="group relative flex items-center justify-between bg-[#25D366]/10 hover:bg-[#25D366]/20 border border-[#25D366]/30 p-4 rounded-xl transition-all duration-300">
                <div class="flex items-center gap-4">
                    <div class="bg-[#25D366] p-2 rounded-lg">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.72 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
                        </svg>
                    </div>
                    <div class="text-left">
                        <p class="font-semibold text-white">WhatsApp</p>
                        <p class="text-sm text-gray-400">Launch in WhatsApp</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-[#25D366] opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>
        </div>

        <p id="error-msg" class="text-red-400 text-sm hidden mt-4">Invalid or missing token. Please ensure you copied
            the full link.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const errorMsg = document.getElementById('error-msg');

            if (!token) {
                errorMsg.classList.remove('hidden');
                document.getElementById('btn-telegram').classList.add('opacity-50', 'pointer-events-none');
                document.getElementById('btn-whatsapp').classList.add('opacity-50', 'pointer-events-none');
                return;
            }

            // TODO: Ensure you swap these with your actual bot username and WhatsApp registered number!
            const TELEGRAM_BOT_USERNAME = "BotivateBot";
            const WHATSAPP_NUMBER = "15551234567"; // Replace with your WhatsApp business number in international format

            const tgBtn = document.getElementById('btn-telegram');
            const waBtn = document.getElementById('btn-whatsapp');

            tgBtn.href = `https://t.me/${TELEGRAM_BOT_USERNAME}?start=${token}`;
            waBtn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=START-${token}`;
        });
    </script>
</body>

</html>
