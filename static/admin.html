<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botivate Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-800">
    <div class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-900">Tenant Provisioning</h1>
            <p class="text-slate-500 mt-2">Create a new Botivate client and map their database.</p>
        </header>

        <form id="provision-form" class="space-y-8 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <!-- Auth -->
            <div>
                <h2 class="text-lg font-semibold text-slate-900 border-b pb-2 mb-4">Authentication</h2>
                <label class="block text-sm font-medium mb-1">Admin Secret Token</label>
                <input type="password" id="adminToken" required class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <!-- Step 1 -->
            <div>
                <h2 class="text-lg font-semibold text-slate-900 border-b pb-2 mb-4">Step 1: Tenant Core Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Company Name</label>
                        <input type="text" id="companyName" required placeholder="Acme Corp" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 hover:border-blue-300 outline-none">
                    </div>
                </div>
            </div>

            <!-- Step 2 -->
            <div>
                <h2 class="text-lg font-semibold text-slate-900 border-b pb-2 mb-4">Step 2: Database Connection</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium mb-1">Database Type</label>
                        <select id="dbType" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 hover:border-blue-300 outline-none">
                            <option value="postgresql">PostgreSQL</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Host</label>
                        <input type="text" id="host" required placeholder="ep-...neon.tech" class="w-full border border-slate-300 rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Port</label>
                        <input type="number" id="port" required value="5432" class="w-full border border-slate-300 rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Database Name</label>
                        <input type="text" id="dbName" required class="w-full border border-slate-300 rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">DB User</label>
                        <input type="text" id="dbUser" required class="w-full border border-slate-300 rounded-lg p-2.5">
                    </div>
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium mb-1">DB Password</label>
                        <input type="password" id="dbPassword" required class="w-full border border-slate-300 rounded-lg p-2.5">
                    </div>
                </div>
            </div>

            <!-- Step 3 -->
            <div>
                <h2 class="text-lg font-semibold text-slate-900 border-b pb-2 mb-4">Step 3: Schema Mapping</h2>
                <div id="schema-maps" class="space-y-4">
                    <!-- Template Map -->
                    <div class="schema-map-item bg-slate-50 p-4 border border-slate-200 rounded-lg">
                        <div class="grid grid-cols-2 gap-4 mb-2">
                            <input type="text" class="map-module border p-2 rounded" placeholder="Module (e.g. minutes_of_meeting)" required>
                            <input type="text" class="map-intent border p-2 rounded" placeholder="Intent (e.g. meeting_schedule)" required>
                        </div>
                        <textarea class="map-sql w-full border p-2 rounded font-mono text-sm" rows="3" placeholder="SELECT status FROM tbl_meetings WHERE employee_name = $1" required></textarea>
                    </div>
                </div>
                <button type="button" id="add-map-btn" class="mt-2 text-blue-600 font-medium text-sm hover:underline">+ Add another SQL map</button>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white font-semibold rounded-lg p-3 hover:bg-slate-800 transition-colors">
                Provision Tenant & Generate Portal Link
            </button>
        </form>

        <div id="result" class="hidden mt-8 bg-green-50 border border-green-200 rounded-2xl p-6 text-center">
            <h3 class="text-xl font-bold text-green-800 mb-2">Tenant Provisioned!</h3>
            <p class="text-green-700 mb-4">Send this magic onboarding link to your client:</p>
            <div class="bg-white border rounded-lg p-4 font-mono text-sm break-all flex items-center justify-between text-left">
                <span id="magic-link" class="text-slate-600"></span>
                <button onclick="navigator.clipboard.writeText(document.getElementById('magic-link').innerText)" class="ml-4 bg-slate-100 px-3 py-1 rounded hover:bg-slate-200">Copy</button>
            </div>
        </div>

        <div id="error" class="hidden mt-8 bg-red-50 border border-red-200 rounded-2xl p-6 text-center text-red-700"></div>
    </div>

    <script>
        document.getElementById('add-map-btn').addEventListener('click', () => {
            const container = document.getElementById('schema-maps');
            const clone = container.firstElementChild.cloneNode(true);
            clone.querySelectorAll('input, textarea').forEach(input => input.value = '');
            container.appendChild(clone);
        });

        document.getElementById('provision-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Testing Database & Provisioning...';
            btn.disabled = true;
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');

            const token = document.getElementById('adminToken').value;

            // Extract modules from schema maps uniquely
            const schemaMapItems = Array.from(document.querySelectorAll('.schema-map-item'));
            const activeModules = [...new Set(schemaMapItems.map(item => item.querySelector('.map-module').value))];
            
            const schema_maps = schemaMapItems.map(item => ({
                module: item.querySelector('.map-module').value,
                intent: item.querySelector('.map-intent').value,
                sql_template: item.querySelector('.map-sql').value
            }));

            const payload = {
                company_name: document.getElementById('companyName').value,
                active_modules: activeModules,
                db_type: document.getElementById('dbType').value,
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value),
                database_name: document.getElementById('dbName').value,
                db_user: document.getElementById('dbUser').value,
                db_password: document.getElementById('dbPassword').value,
                ssl_required: true,
                schema_maps: schema_maps
            };

            try {
                // 1. Create full tenant
                const createRes = await fetch('/admin/tenant/create-full', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
                    body: JSON.stringify(payload)
                });
                
                if (!createRes.ok) throw new Error((await createRes.json()).detail || 'Failed to create tenant');
                const tenantId = (await createRes.json()).tenant_id;

                // 2. Generate link
                const linkRes = await fetch(`/admin/tenant/${tenantId}/generate-link`, {
                    method: 'POST',
                    headers: { 'x-admin-token': token }
                });

                if (!linkRes.ok) throw new Error('Failed to generate magic link');
                const jwt = (await linkRes.json()).token;

                // Success!
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('magic-link').innerText = `${window.location.origin}/static/portal.html?token=${jwt}`;
            } catch (err) {
                document.getElementById('error').innerText = err.message;
                document.getElementById('error').classList.remove('hidden');
            } finally {
                btn.innerText = 'Provision Tenant & Generate Portal Link';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
